[font] 
normal = { family = "Hack" }
size = 14

[window]
dimensions = { columns = 180, lines = 50 }
padding = { x = 5, y = 5 }

[keyboard]
bindings = [
  { key = "C", mods = "Command|Shift", action = "Copy" },
  { key = "V", mods = "Command|Shift", action = "Paste" }
]

[terminal.shell]
program = "/bin/zsh"
args = ["-l", "-c", "tmux attach || tmux"]
